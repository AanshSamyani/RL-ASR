# Experiment 1: GRPO vs REINFORCE
# Tests whether GRPO improves over REINFORCE for ASR-TTA

experiment:
  name: "exp1_grpo"
  description: "GRPO vs REINFORCE for test-time ASR adaptation"

model:
  name: "tiny"
  prompt_length: 4
  device: "cuda"

decoding:
  n_candidates: 4
  temp_range: [0.4, 0.6]
  max_tokens: 224

rl:
  methods:
    - name: "reinforce"
      base_lr: 1.0e-5
      prompt_lr_scale: 100.0

    - name: "grpo_sequence"
      base_lr: 1.0e-5
      prompt_lr_scale: 100.0
      clip_eps: 0.2
      kl_coeff: 0.01
      token_level: false

    - name: "grpo_token"
      base_lr: 1.0e-5
      prompt_lr_scale: 100.0
      clip_eps: 0.2
      kl_coeff: 0.01
      token_level: true

    - name: "grpo_high_kl"
      base_lr: 1.0e-5
      prompt_lr_scale: 100.0
      clip_eps: 0.2
      kl_coeff: 0.1
      token_level: true

reward:
  type: "clap"  # CLAP only to isolate RL algorithm effect

adaptation:
  type: "single_sample"

data:
  root: "data"
  max_samples: 200
  snr_db: 10.0
  noise_types:
    - "gaussian_white"
    - "gaussian_pink"
    - "gaussian_brown"

logging:
  results_dir: "results/exp1_grpo"
  verbose: true
